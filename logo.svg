<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="envGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff69b4"/>
      <stop offset="100%" style="stop-color:#ff1493"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd5b8"/>
      <stop offset="100%" style="stop-color:#ffb899"/>
    </linearGradient>
  </defs>

  <!-- Envelope (she sleeps on) -->
  <rect x="180" y="95" width="180" height="110" rx="12" fill="#2d0a1e" stroke="#ff69b4" stroke-width="2.5"/>
  <polyline points="180,95 270,150 360,95" fill="none" stroke="#ff69b4" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="198" y1="168" x2="245" y2="168" stroke="#ff69b4" stroke-width="1.8" opacity="0.5"/>
  <line x1="198" y1="180" x2="258" y2="180" stroke="#ff69b4" stroke-width="1.8" opacity="0.5"/>

  <!-- Sparkles around -->
  <text x="355" y="75" font-size="16" fill="#ff69b4" opacity="0.9">✦</text>
  <text x="370" y="105" font-size="10" fill="#ffb6d9" opacity="0.7">✦</text>
  <text x="160" y="85" font-size="12" fill="#ff69b4" opacity="0.6">✦</text>

  <!-- ZZZ floating -->
  <text x="120" y="55" font-size="18" fill="#ff69b4" opacity="0.9" font-family="serif" font-weight="bold">z</text>
  <text x="140" y="38" font-size="14" fill="#ff69b4" opacity="0.6" font-family="serif" font-weight="bold">z</text>
  <text x="155" y="25" font-size="10" fill="#ff69b4" opacity="0.4" font-family="serif" font-weight="bold">z</text>

  <!-- Girl body (lying on envelope) -->
  <!-- Dress/body -->
  <ellipse cx="230" cy="100" rx="55" ry="18" fill="#ff69b4" opacity="0.95"/>
  <!-- Legs going back -->
  <ellipse cx="175" cy="108" rx="30" ry="10" fill="#ff69b4" transform="rotate(-15 175 108)"/>
  <!-- Feet -->
  <ellipse cx="148" cy="118" rx="12" ry="7" fill="#ff85c2" transform="rotate(-20 148 118)"/>
  <!-- Arm dangling -->
  <ellipse cx="260" cy="112" rx="22" ry="7" fill="#ffd5b8" transform="rotate(20 260 112)"/>
  <!-- Hand -->
  <circle cx="278" cy="118" r="6" fill="#ffd5b8"/>

  <!-- Head resting sideways -->
  <circle cx="200" cy="88" r="28" fill="url(#skinGrad)"/>
  <!-- Hair -->
  <ellipse cx="200" cy="72" rx="28" ry="14" fill="#3d1a00"/>
  <ellipse cx="178" cy="82" rx="10" ry="18" fill="#3d1a00"/>
  <ellipse cx="222" cy="78" rx="12" ry="16" fill="#3d1a00"/>
  <!-- Hair strand falling -->
  <path d="M185 95 Q175 110 178 120" stroke="#3d1a00" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Closed sleeping eyes -->
  <path d="M188 89 Q193 86 198 89" stroke="#3d1a00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M202 89 Q207 86 212 89" stroke="#3d1a00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyelashes -->
  <line x1="189" y1="89" x2="187" y2="87" stroke="#3d1a00" stroke-width="1.2"/>
  <line x1="193" y1="87" x2="192" y2="85" stroke="#3d1a00" stroke-width="1.2"/>
  <line x1="203" y1="87" x2="202" y2="85" stroke="#3d1a00" stroke-width="1.2"/>
  <line x1="207" y1="87" x2="208" y2="85" stroke="#3d1a00" stroke-width="1.2"/>
  <!-- Rosy cheeks -->
  <circle cx="183" cy="94" r="6" fill="#ffb6c1" opacity="0.6"/>
  <circle cx="217" cy="94" r="6" fill="#ffb6c1" opacity="0.6"/>
  <!-- Little smile -->
  <path d="M194 98 Q200 103 206 98" stroke="#c0607a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Hair bow -->
  <ellipse cx="222" cy="70" rx="8" ry="5" fill="#ff1493" transform="rotate(-30 222 70)"/>
  <ellipse cx="230" cy="65" rx="8" ry="5" fill="#ff1493" transform="rotate(30 230 65)"/>
  <circle cx="226" cy="67" r="4" fill="#ff69b4"/>
</svg>
